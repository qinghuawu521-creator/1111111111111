name: personal_vault
description: Personal Vault - Personal Digital Archive
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Database
  sqflite: ^2.3.2
  path: ^1.8.3
  path_provider: ^2.1.2

  # Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # UI
  flutter_staggered_animations: ^1.1.1
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0

  # File Handling
  file_picker: ^6.1.1
  image_picker: ^1.0.7
  open_file: ^3.3.2
  share_plus: ^7.2.1

  # Export
  pdf: ^3.10.7
  printing: ^5.12.0
  archive: ^3.6.1

  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  url_launcher: ^6.2.2
  mime: ^1.0.5
  collection: ^1.18.0
  logger: ^2.0.2+1
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
